name: Release

on:
  push:
    tags:
      - '*'
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Publish release for pushed tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
